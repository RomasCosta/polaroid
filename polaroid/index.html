<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaroid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/icons-câmera-bubbles.png">
    <script src="script.js" defer></script>
</head>
<body>

    <audio id="musica-fundo" loop>
        <source src="audio/ensename.mpeg" type="audio/mpeg">
    </audio>

    <div class="controle-musica" onclick="alternarMusica()">
        <img id="icone-musica" src="img/mib.jpg" alt="Tocar/Pausar Música" class="polaroid">
    </div>

    <h1 class="texto-topo">MEMÓRIAS 📸</h1>

    <div class="scenery-container">
        
        <img src="img/frieren_1.jpg" alt="Personagem Principal" class="character polaroid">

        <img src="img/frieren_1.jpg" alt="Item 1" class="floating-item polaroid item-1">
        <img src="img/frieren_2.jpg" alt="Item 2" class="floating-item polaroid item-2">
        <img src="img/frieren_3.jpg" alt="Item 3" class="floating-item polaroid item-3">
        <img src="img/frieren_3.jpg" alt="Item 3" class="floating-item polaroid item-4">


    </div>

    <h2 class="texto-base">FELIZ ANIVERSÁRIO 🎉</h2>

</html>
